<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite de Aniversário</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f2f2f2;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px; /* Ajuste conforme desejar */
        }

        .container img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="convite.png" alt="Convite de Aniversário">
    </div>

</body>
</html>
