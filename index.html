<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite de Aniversário</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f2f2f2;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 700px;
        }

        .container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Área invisível clicável do WhatsApp */
        .whatsapp {
            position: absolute;

            /* Ajuste esses valores para posicionar o botão */
            bottom: 2%;
            left: 30%;
            width: 38%;
            height: 8%;

            cursor: pointer;
        }

    </style>
</head>

<body>

    <div class="container">

        <img src="convite.png" alt="Convite de Aniversário">

        <!-- Área clicável -->
        <a class="whatsapp"
           href="https://wa.me/5511955693285?text=Olá!%20Confirmo%20minha%20presença%20na%20festa!"
           target="_blank">
        </a>

    </div>

</body>
</html>
